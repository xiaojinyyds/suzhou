<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索姑苏 - 七座石像文化之旅</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2E7D32;
            --primary-light: #4CAF50;
            --accent-green: #66BB6A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--primary-green), var(--accent-green));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-container {
            text-align: center;
            color: white;
            max-width: 500px;
        }

        .welcome-logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInDown 1s ease;
        }

        .welcome-logo i {
            font-size: 4rem;
            color: var(--primary-green);
        }

        .welcome-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: bold;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .welcome-subtitle {
            font-size: 1.5rem;
            margin-bottom: 50px;
            opacity: 0.95;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .start-btn {
            padding: 18px 60px;
            background: white;
            color: var(--primary-green);
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease 0.9s both;
            text-decoration: none;
            display: inline-block;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .features {
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            animation: fadeIn 1s ease 1.2s both;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .feature-item i {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .feature-item h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .feature-item p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .welcome-title {
                font-size: 2.5rem;
            }

            .welcome-subtitle {
                font-size: 1.2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-logo">
            <i class="fas fa-landmark"></i>
        </div>
        <h1 class="welcome-title">探索姑苏</h1>
        <p class="welcome-subtitle">七座石像的文化之旅</p>
        <a href="login.html" class="start-btn">开始探索</a>

        <div class="features">
            <div class="feature-item">
                <i class="fas fa-map-marked-alt"></i>
                <h3>景点打卡</h3>
                <p>探索7座历史建筑</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-camera"></i>
                <h3>AR拍照</h3>
                <p>赛博风格装饰</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-birthday-cake"></i>
                <h3>美食品鉴</h3>
                <p>品尝苏式甜品</p>
            </div>
        </div>
    </div>
</body>
</html>
