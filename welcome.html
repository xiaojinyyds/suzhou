<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索姑苏 - 七座石像的文化之旅</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .welcome-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, rgba(211, 47, 47, 0.9) 0%, rgba(69, 90, 100, 0.9) 100%);
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 50%, white 2px, transparent 2px),
                radial-gradient(circle at 80% 80%, white 2px, transparent 2px),
                radial-gradient(circle at 60% 20%, white 2px, transparent 2px);
            background-size: 100px 100px;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            z-index: 1;
            animation: fadeInUp 1s ease;
        }

        .logo-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .app-subtitle {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* 特色展示 */
        .features {
            display: flex;
            gap: 1.5rem;
            z-index: 1;
            animation: fadeInUp 1s ease 0.3s backwards;
        }

        .feature-item {
            text-align: center;
            color: white;
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .feature-text {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        /* 按钮区域 */
        .action-buttons {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1;
            animation: fadeInUp 1s ease 0.6s backwards;
        }

        .welcome-btn {
            padding: 1.125rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-start {
            background: white;
            color: var(--primary-color);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        .btn-login {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(10px);
        }

        .btn-login:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        /* 底部版权 */
        .copyright {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
            z-index: 1;
            animation: fadeIn 2s ease 1s backwards;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .app-title {
                font-size: 2rem;
            }
            
            .logo-icon {
                font-size: 4rem;
            }

            .features {
                gap: 1rem;
            }

            .feature-icon {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="welcome-container">
            <!-- 背景装饰 -->
            <div class="bg-pattern"></div>

            <!-- Logo区域 -->
            <div class="logo-section">
                <div class="logo-icon">🏛️</div>
                <h1 class="app-title">探索姑苏</h1>
                <p class="app-subtitle">七座石像的文化之旅</p>
            </div>

            <!-- 特色展示 -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">📍</div>
                    <div class="feature-text">GPS打卡</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📸</div>
                    <div class="feature-text">AI拍照</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🍰</div>
                    <div class="feature-text">美食点单</div>
                </div>
            </div>

            <!-- 按钮区域 -->
            <div class="action-buttons">
                <button class="welcome-btn btn-start" onclick="location.href='register.html'">
                    <span>🚀</span>
                    <span>立即开始</span>
                </button>
                <button class="welcome-btn btn-login" onclick="location.href='login.html'">
                    <span>👤</span>
                    <span>已有账号，直接登录</span>
                </button>
            </div>

            <!-- 底部版权 -->
            <div class="copyright">
                © 2024 探索姑苏 · 发现江南文化之美
            </div>
        </div>
    </div>
</body>
</html>
