<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 探索姑苏</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            background: var(--gradient-purple);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        /* 顶部导航 */
        .nav-header {
            display: flex;
            align-items: center;
            margin-bottom: 3rem;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }

        /* Logo区域 */
        .login-logo {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.6s ease;
        }

        .login-logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
        }

        /* 登录表单 */
        .login-form {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.6s ease 0.2s backwards;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: var(--text-light);
        }

        .login-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.25rem;
        }

        /* 记住我和忘记密码 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* 登录按钮 */
        .login-button {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-red);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            margin-bottom: 1rem;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* 第三方登录 */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-button {
            flex: 1;
            padding: 0.875rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background: white;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-button:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* 注册链接 */
        .register-link {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-form {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="login-container">
            <!-- 顶部导航 -->
            <div class="nav-header">
                <button class="back-button" onclick="location.href='welcome.html'">
                    ←
                </button>
            </div>

            <!-- Logo区域 -->
            <div class="login-logo">
                <div class="login-logo-icon">🏛️</div>
                <h1 class="login-title">欢迎回来</h1>
                <p class="login-subtitle">继续你的文化探索之旅</p>
            </div>

            <!-- 登录表单 -->
            <div class="login-form">
                <h2 class="form-title">账号登录</h2>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- 手机号/邮箱 -->
                    <div class="input-group">
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input 
                                type="text" 
                                class="login-input" 
                                placeholder="手机号 / 邮箱"
                                required
                            >
                        </div>
                    </div>

                    <!-- 密码 -->
                    <div class="input-group">
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                id="password"
                                class="login-input" 
                                placeholder="请输入密码"
                                required
                            >
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                👁️
                            </button>
                        </div>
                    </div>

                    <!-- 记住我和忘记密码 -->
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <!-- 登录按钮 -->
                    <button type="submit" class="login-button">
                        登录
                    </button>
                </form>

                <!-- 分隔线 -->
                <div class="divider">其他登录方式</div>

                <!-- 第三方登录 -->
                <div class="social-login">
                    <button class="social-button" title="微信登录">💬</button>
                    <button class="social-button" title="QQ登录">🐧</button>
                    <button class="social-button" title="支付宝登录">💳</button>
                </div>

                <!-- 注册链接 -->
                <div class="register-link">
                    还没有账号？<a href="register.html">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换密码可见性
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // 处理登录
        function handleLogin(event) {
            event.preventDefault();
            
            // 模拟登录延迟
            const button = event.target.querySelector('.login-button');
            button.textContent = '登录中...';
            button.disabled = true;
            
            setTimeout(() => {
                // 保存登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', '探索者');
                
                // 跳转到主页面
                location.href = 'main.html';
            }, 1000);
        }

        // 检查是否已登录
        if (localStorage.getItem('isLoggedIn') === 'true') {
            // 已登录，直接跳转
            location.href = 'main.html';
        }
    </script>
</body>
</html>
